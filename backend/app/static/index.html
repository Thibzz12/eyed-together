<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EyeD Together</title>
  <link rel="stylesheet" href="/static/fonts/jakarta.css">
  <link rel="stylesheet" href="/static/styles.css?v=4">
</head>
<body>

  <!-- ============== CONNEXION ============== -->
  <section id="login" class="login hidden">
    <div class="login-card">
      <img class="login-logo" src="/static/img/logo.svg" alt="EyeD Pharma">
      <h1>EyeD Together</h1>
      <p class="subtitle">Le portail des collaborateurs</p>
      <a class="btn btn-primary" href="/auth/wordpress-start">Se connecter avec mon compte EyeD</a>
      <p class="login-hint">Tu passes par l'intranet EyeD pour valider ton identité.</p>
      <a class="btn btn-ghost" href="/auth/dev-login">Essayer en démo</a>
    </div>
  </section>

  <!-- ============== APPLICATION ============== -->
  <div id="app" class="app hidden">
    <aside class="sidebar">
      <div class="brand"><img src="/static/img/logo.svg" alt="EyeD Pharma"></div>
      <nav class="nav" id="nav">
        <a data-route="accueil" class="nav-link">
          <svg viewBox="0 0 24 24" class="ic"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg> Accueil</a>
        <a data-route="reserver" class="nav-link">
          <svg viewBox="0 0 24 24" class="ic"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> Réserver une place</a>
        <a data-route="evenements" class="nav-link">
          <svg viewBox="0 0 24 24" class="ic"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg> Événements</a>
        <a data-route="presence" class="nav-link">
          <svg viewBox="0 0 24 24" class="ic"><path d="M20 6L9 17l-5-5"/></svg> Ma présence</a>
        <a data-route="admin" class="nav-link nav-admin hidden">
          <svg viewBox="0 0 24 24" class="ic"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.3 1a7 7 0 0 0-1.7-1l-.3-2.5h-4l-.3 2.5a7 7 0 0 0-1.7 1l-2.3-1-2 3.5 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.5 2.3-1a7 7 0 0 0 1.7 1l.3 2.5h4l.3-2.5a7 7 0 0 0 1.7-1l2.3 1 2-3.5-2-1.5a7 7 0 0 0 .1-1z"/></svg> Administration</a>
      </nav>
      <div class="side-user">
        <div class="avatar" id="avatar">–</div>
        <div class="su-info"><b id="userName">—</b><small id="userLevel">—</small></div>
        <a class="su-logout" href="/auth/logout" title="Se déconnecter">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg>
        </a>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu">
          <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
        <h1 id="pageTitle">Accueil</h1>
        <div class="topbar-right">
          <div class="points-pill" id="pointsPill">
            <svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.94 14.66A5 5 0 1 1 15.34 8"/><path d="m12 2 2.6 5.3L20 8l-4 3.9.9 5.5L12 14.8 7.1 17.4 8 11.9 4 8l5.4-.7z"/></svg>
            <span id="pointsValue">0</span>
          </div>
          <div class="avatar-wrap"><div class="avatar avatar-mobile" id="avatarMobile">–</div><span class="status-dot"></span></div>
        </div>
      </header>
      <main id="view" class="view"></main>
    </div>
  </div>

  <!-- Barre d'onglets mobile -->
  <nav class="tabbar" id="tabbar">
    <a data-route="accueil" class="tab-link">
      <svg viewBox="0 0 24 24" class="ic"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg><span>Accueil</span></a>
    <a data-route="reserver" class="tab-link">
      <svg viewBox="0 0 24 24" class="ic"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Réserver</span></a>
    <a data-route="evenements" class="tab-link">
      <svg viewBox="0 0 24 24" class="ic"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg><span>Événements</span></a>
    <a data-route="presence" class="tab-link">
      <svg viewBox="0 0 24 24" class="ic"><path d="M20 6L9 17l-5-5"/></svg><span>Présence</span></a>
  </nav>

  <!-- Barre de sélection (vue Réserver) -->
  <div id="selectionBar" class="selection-bar hidden">
    <div class="sel-info"><span class="sel-desk" id="selDesk"></span><span class="sel-meta" id="selMeta"></span></div>
    <div class="sel-actions">
      <button class="sel-cancel-sel" id="selDeselect">Annuler</button>
      <button class="sel-confirm" id="selConfirm">Confirmer</button>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="/static/app.js?v=4"></script>
</body>
</html>
